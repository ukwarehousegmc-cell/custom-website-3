<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator — Powered by Imagen 3.0</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header__inner">
                <h1 class="header__title">🎨 AI Image Generator</h1>
                <p class="header__sub">Powered by Google Imagen 3.0</p>
            </div>
        </header>

        <main class="main">
            <div class="generator">
                <!-- Prompt -->
                <div class="generator__field">
                    <label class="generator__label">Describe your image</label>
                    <textarea id="prompt" class="generator__textarea" placeholder="A futuristic city at sunset with flying cars and neon lights..." rows="3"></textarea>
                </div>

                <!-- Options row -->
                <div class="generator__options">
                    <div class="generator__field generator__field--small">
                        <label class="generator__label">Style</label>
                        <select id="style" class="generator__select">
                            <option value="realistic">📷 Realistic</option>
                            <option value="artistic">🎨 Artistic</option>
                            <option value="anime">🌸 Anime</option>
                            <option value="3d">🎮 3D Render</option>
                            <option value="watercolor">💧 Watercolor</option>
                            <option value="sketch">✏️ Sketch</option>
                            <option value="digital_art">🖥️ Digital Art</option>
                            <option value="oil_painting">🖼️ Oil Painting</option>
                        </select>
                    </div>
                    <div class="generator__field generator__field--small">
                        <label class="generator__label">Aspect Ratio</label>
                        <select id="aspect_ratio" class="generator__select">
                            <option value="1:1">1:1 Square</option>
                            <option value="16:9">16:9 Landscape</option>
                            <option value="9:16">9:16 Portrait</option>
                            <option value="4:3">4:3 Standard</option>
                            <option value="3:4">3:4 Tall</option>
                        </select>
                    </div>
                    <div class="generator__field generator__field--small">
                        <label class="generator__label">Count</label>
                        <select id="count" class="generator__select">
                            <option value="1">1 Image</option>
                            <option value="2">2 Images</option>
                            <option value="4">4 Images</option>
                        </select>
                    </div>
                </div>

                <!-- Generate button -->
                <button id="generateBtn" class="generator__btn" onclick="generateImage()">
                    <span class="generator__btn-text">✨ Generate Image</span>
                    <span class="generator__btn-loading" style="display:none">
                        <span class="spinner"></span> Generating...
                    </span>
                </button>
            </div>

            <!-- Results -->
            <div id="results" class="results" style="display:none">
                <h2 class="results__heading">Generated Images</h2>
                <div id="resultsGrid" class="results__grid"></div>
            </div>

            <!-- Error -->
            <div id="error" class="error" style="display:none">
                <p id="errorText"></p>
            </div>
        </main>

        <footer class="footer">
            <p>Built with Google Imagen 3.0 API • Express Matting Services Ltd.</p>
        </footer>
    </div>

    <script>
        async function generateImage() {
            const prompt = document.getElementById('prompt').value.trim();
            const style = document.getElementById('style').value;
            const aspectRatio = document.getElementById('aspect_ratio').value;
            const count = parseInt(document.getElementById('count').value);
            
            if (!prompt) {
                showError('Please enter a prompt to generate an image.');
                return;
            }

            const btn = document.getElementById('generateBtn');
            const btnText = btn.querySelector('.generator__btn-text');
            const btnLoading = btn.querySelector('.generator__btn-loading');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline-flex';
            hideError();

            try {
                const response = await fetch('/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, style, aspect_ratio: aspectRatio, count })
                });

                const data = await response.json();

                if (count > 1 && data.results) {
                    showMultipleResults(data.results);
                } else if (data.success && data.image_data) {
                    showSingleResult(data.image_data, data.message);
                } else {
                    showError(data.message || 'Failed to generate image.');
                }
            } catch (err) {
                showError('Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }

        function showSingleResult(imageData, message) {
            const grid = document.getElementById('resultsGrid');
            const card = createImageCard(imageData, message);
            grid.insertBefore(card, grid.firstChild);
            document.getElementById('results').style.display = 'block';
            grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showMultipleResults(results) {
            const grid = document.getElementById('resultsGrid');
            const wrapper = document.createElement('div');
            wrapper.className = 'results__batch';
            
            results.forEach(r => {
                if (r.success && r.image_data) {
                    const card = createImageCard(r.image_data, r.message);
                    wrapper.appendChild(card);
                }
            });
            
            if (wrapper.children.length > 0) {
                grid.insertBefore(wrapper, grid.firstChild);
                document.getElementById('results').style.display = 'block';
                grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                showError('No images were generated. Try a different prompt.');
            }
        }

        function createImageCard(imageData, message) {
            const card = document.createElement('div');
            card.className = 'results__card';
            card.innerHTML = `
                <div class="results__img-wrap">
                    <img src="data:image/png;base64,${imageData}" alt="Generated image" class="results__img">
                </div>
                <div class="results__actions">
                    <button class="results__action-btn" onclick="downloadImage(this)" title="Download">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        Download
                    </button>
                    <span class="results__badge">${message || 'Imagen 3.0'}</span>
                </div>
            `;
            return card;
        }

        function downloadImage(btn) {
            const img = btn.closest('.results__card').querySelector('img');
            const a = document.createElement('a');
            a.href = img.src;
            a.download = 'generated-image-' + Date.now() + '.png';
            a.click();
        }

        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('error').style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        // Allow Ctrl+Enter to generate
        document.getElementById('prompt').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                generateImage();
            }
        });
    </script>
</body>
</html>
